<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Amir | Portfolio</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <h1>Amir</h1>
  <p>Software Developer | amir-labs</p>

  <nav>
    <a href="#about">About</a>
    <a href="#skills">Skills</a>
    <a href="#projects">Projects</a>
    <a href="#contact">Contact</a>
  </nav>
</header>

<section id="about">
  <h2>About Me</h2>
  <p id="about-text">
    I am a passionate software developer learning web development, AI, and building modern projects.
  </p>
</section>

<section id="skills">
  <h2>Skills</h2>
  <div id="skills-list">
    Loading skills...
  </div>
</section>

<section id="projects">
  <h2>Projects</h2>
  <div id="projects-list">
    Loading projects...
  </div>
</section>

<section id="contact">
  <section id="contact">
  <h2>Contact</h2>

  <p id="email"></p>
  <p id="github"></p>
  <p id="linkedin"></p>
</section>

<script>
async function loadContact() {
  const res = await fetch('content/contact.md');
  const text = await res.text();

  const lines = text.split("\n");

  document.getElementById("email").innerText = lines[0];
  document.getElementById("github").innerText = lines[1];
  document.getElementById("linkedin").innerText = lines[2];
}



<footer>
  Built by Amir | amir-labs
</footer>

<script>
async function loadContent() {
  const skillsRes = await fetch('skills.md');
  const skillsText = await skillsRes.text();

  const projectsRes = await fetch('projects.md');
  const projectsText = await projectsRes.text();

  document.getElementById("skills-list").innerHTML =
    skillsText.replaceAll("-", "•");

  document.getElementById("projects-list").innerHTML =
    projectsText.replaceAll("-", "•");
}

loadContent();
</script>

</body>
</html>
