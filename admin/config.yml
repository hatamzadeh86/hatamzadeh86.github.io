backend:
  name: git-gateway
  branch: main

media_folder: "images"
public_folder: "/images"

collections:
  - name: "skills"
    label: "Skills"
    files:
      - file: "skills.md"
        label: "Skills"
        name: "skills"
        fields:
          - { label: "Skills List", name: "body", widget: "markdown" }

  - name: "projects"
    label: "Projects"
    files:
      - file: "projects.md"
        label: "Projects"
        name: "projects"
        fields:
          - { label: "Projects List", name: "body", widget: "markdown" }
